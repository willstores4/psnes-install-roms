name: Build PS4 Rom Installer PKG

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld wget tar unzip
          wget http://archive.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2_amd64.deb
          sudo dpkg -i libssl1.1_1.1.1f-1ubuntu2_amd64.deb || true

      - name: Setup OpenOrbis Toolchain
        run: |
          wget https://github.com/OpenOrbis/OpenOrbis-PS4-Toolchain/releases/download/v0.5.4/toolchain-llvm-18.tar.gz -O toolchain.tar.gz
          mkdir -p $GITHUB_WORKSPACE/openorbis
          tar -xf toolchain.tar.gz -C $GITHUB_WORKSPACE/openorbis
          # The tarball might extract into a subdirectory, so we find the actual root
          TOOLCHAIN_DIR=$(find $GITHUB_WORKSPACE/openorbis -name "include" -type d | head -n 1 | xargs dirname)
          echo "OO_PS4_TOOLCHAIN=$TOOLCHAIN_DIR" >> $GITHUB_ENV

      - name: Compile C++ Code
        run: |
          # Give execution permissions to OpenOrbis binaries
          chmod +x $OO_PS4_TOOLCHAIN/bin/linux/*
          make

      - name: Generate GP4 dynamically
        run: |
          cd pkg_structure
          python -c '
          import os
          xml = """<?xml version="1.0" encoding="utf-8"?>
          <psproject fmt="gp4" version="1000">
            <volume>
              <volume_type>pkg_ps4_app</volume_type>
              <volume_id>PS4VOLUME</volume_id>
              <volume_ts>2023-01-01 00:00:00</volume_ts>
              <package version="01.00" content_id="IV0001-ROMS00001_00-ROMS000016070000" passcode="00000000000000000000000000000000"/>
              <chunk_info chunk_count="1" scenario_count="1">
                <chunks><chunk id="0" layer_no="0" label="Chunk 0"/></chunks>
                <scenarios><scenario id="0" type="sp" initial_chunk_count="1" default_weight="1">0</scenario></scenarios>
              </chunk_info>
            </volume>
            <files img_no="0">\n"""
          
          dirs = set()
          for root, _, files in os.walk("."):
              if "sce_sys" in root: continue
              for file in files:
                  if file.endswith(".gp4") or file.endswith(".pkg"): continue
                  rel_path = os.path.relpath(os.path.join(root, file), ".").replace("\\\\", "/")
                  if file == "eboot.bin":
                      xml += f"    <file targ_path=\"{rel_path}\" orig_path=\"{rel_path}\" chunk_no=\"0\" btype=\"55\"/>\n"
                  else:
                      xml += f"    <file targ_path=\"{rel_path}\" orig_path=\"{rel_path}\" chunk_no=\"0\"/>\n"
                  
                  parts = rel_path.split("/")[:-1]
                  if parts:
                      dirs.add("/".join(parts))
          
          xml += "  </files>\n  <rootdir>\n"
          
          dirs.add("sce_sys")
          tree = {}
          for d in dirs:
              parts = d.split("/")
              curr = tree
              for p in parts:
                  if p not in curr: curr[p] = {}
                  curr = curr[p]
          
          def print_tree(t, ind="    "):
              res = ""
              for k, v in t.items():
                  if v:
                      res += f"{ind}<dir targ_name=\"{k}\">\n"
                      res += print_tree(v, ind + "  ")
                      res += f"{ind}</dir>\n"
                  else:
                      res += f"{ind}<dir targ_name=\"{k}\"/>\n"
              return res
          
          xml += print_tree(tree)
          xml += "  </rootdir>\n</psproject>"
          with open("pkg.gp4", "w") as f:
              f.write(xml)
          '
      - name: Build PKG
        run: |
          $OO_PS4_TOOLCHAIN/bin/linux/PkgTool.Core pkg_build pkg_structure/pkg.gp4 pkg_structure/

      - name: Upload PKG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RomInstaller-PS4
          path: pkg_structure/*.pkg
